services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payment_db
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M

  kafka:
    image: apache/kafka:4.2.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  auth-service:
    build:
      context: .
      args:
        SERVICE_PATH: auth
    environment:
      - GRPC_PORT=50051
      - JWT_SECRET=very-secret-key
      - LOG_LEVEL=debug
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M

  gateway:
    build:
      context: .
      args:
        SERVICE_PATH: gateway
    ports:
      - "8080:8080"
    environment:
      - HTTP_PORT=8080
      - AUTH_ADDR=auth-service:50051
      - ORDER_ADDR=order-service:50053
      - LOG_LEVEL=debug
    depends_on:
      - auth-service
      - order-service
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 96M

  inventory-service:
    build:
      context: .
      args:
        SERVICE_PATH: inventory
    environment:
      - GRPC_PORT=50052
      - POSTGRES_DSN=postgres://user:password@postgres:5432/payment_db?sslmode=disable
      - LOG_LEVEL=debug
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M

  order-service:
    build:
      context: .
      args:
        SERVICE_PATH: order
    environment:
      - GRPC_PORT=50053
      - POSTGRES_DSN=postgres://user:password@postgres:5432/payment_db?sslmode=disable
      - INVENTORY_ADDR=inventory-service:50052
      - KAFKA_BROKERS=kafka:9092
      - LOG_LEVEL=debug
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 96M

  payment-service:
    build:
      context: .
      args:
        SERVICE_PATH: payment
    environment:
      - POSTGRES_DSN=postgres://user:password@postgres:5432/payment_db?sslmode=disable
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=kafka:9092
      - LOG_LEVEL=debug
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 96M

  notification-service:
    build:
      context: .
      args:
        SERVICE_PATH: notification
    environment:
      - KAFKA_BROKERS=kafka:9092
      - LOG_LEVEL=debug
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 48M
